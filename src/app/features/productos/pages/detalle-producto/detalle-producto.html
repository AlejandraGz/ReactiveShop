@if (producto$ | async; as producto) {
<div class="container">
    <div class="detalle-producto">
        <app-imagen-producto class="item imagen-producto" [imagen]="producto.imagen"></app-imagen-producto>
        <app-info-producto class="item info-producto" [nombre]="producto.nombre" [precio]="producto.precio"
            [descripcion]="producto.descripcion" [stock]="producto.stock">
        </app-info-producto>
    </div>

</div>
}
