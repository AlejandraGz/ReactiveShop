<div class="page checkout">

    <form>

        <section class="seccion">
            <h2>Datos de contacto</h2>

            <div class="form">
                <label for="correo">Correo electrónico</label>
                <input id="correo" type="email" placeholder="correo@ejemplo.com">
            </div>
        </section>

        <section class="seccion">
            <h2>Datos del destinatario</h2>

            <div class="nombre">

                <div class="form">
                    <label for="nombre">Nombre</label>
                    <input id="nombre" type="text" placeholder="Nombre">
                </div>

                <div class="form">
                    <label for="apellidos">Apellidos</label>
                    <input id="apellidos" type="text" placeholder="Apellidos">
                </div>

            </div>

            <div class="form">
                <label for="telefono">Teléfono</label>
                <input id="telefono" type="tel" placeholder="300 123 4567">
            </div>
        </section>

        <section class="seccion">
            <h2>Dirección de entrega</h2>

            <div class="direccion">

                <div class="form">
                    <label for="direccion">Dirección</label>
                    <input id="direccion" type="text" placeholder="Cra 10 # 20 - 30">
                </div>

                <div class="form">
                    <label for="barrio">Barrio</label>
                    <input id="barrio" type="text" placeholder="Opcional">
                </div>

                <div class="form">
                    <label for="ciudad">Ciudad</label>
                    <input id="ciudad" type="text" placeholder="Bogotá">
                </div>

                <div class="form">
                    <label for="departamento">Departamento</label>
                    <input id="departamento" type="text" placeholder="Cundinamarca">
                </div>

            </div>
        </section>

        <section class="forma-pago">
            <p>
                Todas las transacciones son seguras y están encriptadas.
            </p>
        </section>

        <button type="submit" class="btn-amarillo">
            Pagar
        </button>

    </form>
</div>
