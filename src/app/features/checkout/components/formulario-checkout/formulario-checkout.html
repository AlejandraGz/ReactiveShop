<div class="page checkout">
    <form #checkoutForm="ngForm">
        <section class="seccion">
            <h2>Datos de contacto</h2>

            <div class="form">
                <label for="correo">Correo electrónico</label>
                <input id="correo" name="correo" type="email" ngModel required placeholder="correo@ejemplo.com">
            </div>
        </section>

        <section class="seccion">
            <h2>Datos del destinatario</h2>

            <div class="nombre">
                <div class="form">
                    <label for="nombre">Nombre</label>
                    <input id="nombre" name="nombre" type="text" ngModel required placeholder="Nombre">
                </div>

                <div class="form">
                    <label for="apellidos">Apellidos</label>
                    <input id="apellidos" name="apellidos" type="text" ngModel required placeholder="Apellidos">
                </div>
            </div>

            <div class="form">
                <label for="telefono">Teléfono</label>
                <input id="telefono" name="telefono" type="tel" ngModel required placeholder="300 123 4567">
            </div>
        </section>

        <section class="seccion">

            <h2>Dirección de entrega</h2>

            <div class="direccion">
                <div class="form">
                    <label for="direccion">Dirección</label>
                    <input id="direccion" name="direccion" type="text" ngModel required placeholder="Cra 10 # 20 - 30">
                </div>

                <div class="form">
                    <label for="barrio">Barrio</label>
                    <input id="barrio" name="barrio" type="text" ngModel placeholder="Opcional">
                </div>

                <div class="form">
                    <label for="ciudad">Ciudad</label>
                    <input id="ciudad" name="ciudad" type="text" ngModel required placeholder="Bogotá">
                </div>

                <div class="form">
                    <label for="departamento">Departamento</label>
                    <input id="departamento" name="departamento" type="text" ngModel required placeholder="Cundinamarca">
                </div>
            </div>
        </section>
        <section class="forma-pago">
            <p>Todas las transacciones son seguras y están encriptadas.</p>
        </section>



        <button type="button" class="btn-amarillo" [disabled]="checkoutForm.invalid || toggle"(click)="toggleModal()">Pagar</button>

        @if (toggle) { <app-carrito-pagado></app-carrito-pagado> }

    </form>

</div>
