@if(productos) {
<div class="page carrito">
    <h1>Carrito de compras</h1>
    <div class="titulos">
        <h3>Productos</h3>
        <h3>Subtotal</h3>
    </div>
    @for(item of productos; track item.producto.id){
    <div class="producto-subtotal">
        <div class="producto" >
            <img [src]="item.producto.imagen" alt="">
            <p>{{item.producto.nombre}}</p>
        </div>
        <div class="subtotal">
            <p>{{item.producto.precio}}</p>
        </div>
    </div>
    }
</div>
}
