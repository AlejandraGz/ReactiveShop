@if(productos.length > 0) {

<div class="page carrito">

    <div class="carrito-lista">

        <div class="carrito-header">

            <h3>Producto</h3>
            <h3>Cantidad</h3>
            <h3>Subtotal</h3>

        </div>

        @for(item of productos; track item.producto.id) {

        <div class="carrito-item">

            <div class="producto">

                <img
                    [src]="item.producto.imagen"
                    [alt]="item.producto.nombre"
                    class="producto-imagen">

                <div class="producto-info">

                    <p
                        class="producto-nombre"
                        [routerLink]="['/producto', slugify(item.producto.nombre)]">

                        {{ item.producto.nombre }}

                    </p>

                </div>

            </div>

            <div class="carrito-cantidad">

                <div class="producto-cantidad">

                    <button
                        class="cantidad-btn"
                        (click)="cantidadProducto('restar', item.producto)">

                        −

                    </button>

                    <span class="cantidad-numero">
                        {{ item.cantidad }}
                    </span>

                    <button
                        class="cantidad-btn"
                        (click)="cantidadProducto('sumar', item.producto)">

                        +

                    </button>

                </div>

            </div>

            <div class="carrito-subtotal">

                <div class="subtotal">

                    <p>
                        {{ item.producto.precio | currency:'$ ':'symbol':'1.0-0' }}
                    </p>

                    <button
                        class="carrito-eliminar"
                        (click)="borrarProductoCarrito(item.producto)">

                        <mat-icon>delete</mat-icon>

                    </button>

                </div>

            </div>

        </div>

        }

    </div>

    <app-resumen-pedido class="carrito-total"></app-resumen-pedido>

</div>

}

@else {

<div class="page carrito-vacio">

    <h2>Tu carrito está vacío</h2>
    <p>Agrega productos para comenzar.</p>

</div>

}
